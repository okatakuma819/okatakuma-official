<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理者ログイン | 岡拓真 公式サイト</title>
  <style>
    body { margin: 0; font-family: sans-serif; background: #f5f7fa; color: #222; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .box { background: white; width: 90%; max-width: 420px; padding: 35px; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    h1 { margin-top: 0; color: #0d47a1; font-size: 26px; }
    input { width: 100%; padding: 12px; margin: 10px 0; font-size: 16px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; margin-top: 15px; font-size: 16px; background: #0d47a1; color: white; border: none; border-radius: 8px; cursor: pointer; }
    .back { display: block; margin-top: 20px; text-align: center; color: #0d47a1; text-decoration: none; }
    #message { margin-top: 15px; color: red; font-size: 14px; word-break: break-all; }
  </style>
</head>

<body>
  <div class="box">
    <h1>管理者ログイン</h1>

    <input type="email" id="email" placeholder="メールアドレス" />
    <input type="password" id="password" placeholder="パスワード" />

    <button id="loginBtn">ログイン</button>

    <p id="message"></p>

    <a class="back" href="index.html">トップページへ戻る</a>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB8h-Qmk-3PbYXNiQfV9rTvdVKAFSibfiw",
      authDomain: "okatakuma-official.firebaseapp.com",
      projectId: "okatakuma-official",
      storageBucket: "okatakuma-official.firebasestorage.app",
      messagingSenderId: "71069680445",
      appId: "1:71069680445:web:6b37b60c06df9151aa3b54",
      measurementId: "G-S6JBP46426"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById("loginBtn").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const message = document.getElementById("message");

      try {
        await signInWithEmailAndPassword(auth, email, password);
        location.href = "admin.html";
      } catch (error) {
        console.error(error);
        message.textContent = error.code + "： " + error.message;
      }
    });
  </script>
</body>
</html>
